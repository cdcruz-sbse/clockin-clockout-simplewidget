<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock In / Out</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #101012;
    --card: rgba(255, 255, 255, .04);
    --card-border: rgba(255, 255, 255, .08);
    --card-border-hover: rgba(255, 255, 255, .12);
    --text-primary: #E8E8E8;
    --text-secondary: rgba(255, 255, 255, .35);
    --accent: #EB204E;
    --accent-dim: rgba(235, 32, 78, .12);
    --accent-glow: rgba(235, 32, 78, .20);
    --neutral: rgba(255, 255, 255, .30);
    --neutral-dim: rgba(255, 255, 255, .06);
    --radius: 22px;
    --transition: .35s cubic-bezier(.4, 0, .2, 1);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100dvh;
    display: grid;
    place-items: center;
    padding: 1rem;
    overflow: hidden;
  }

  /* subtle noise texture */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* ambient accent glow */
  body::before {
    content: '';
    position: fixed;
    width: 500px; height: 500px;
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -55%);
    background: radial-gradient(circle, rgba(235,32,78,.06) 0%, transparent 65%);
    pointer-events: none;
    transition: background .6s ease;
    z-index: 0;
  }
  body.clocked-in::before {
    background: radial-gradient(circle, rgba(235,32,78,.12) 0%, transparent 60%);
  }
  body.clocked-out::before {
    background: radial-gradient(circle, rgba(255,255,255,.02) 0%, transparent 65%);
  }

  /* ---- CARD ---- */
  .card {
    position: relative;
    width: 100%;
    max-width: 360px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 1.5rem 1.5rem 1.35rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    animation: fadeUp .6s ease both;
    z-index: 1;
    transition: border-color var(--transition);
  }
  .card:hover { border-color: var(--card-border-hover); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px) scale(.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ---- CLOCK ---- */
  .clock-wrap { text-align: center; }
  .clock {
    font-family: 'JetBrains Mono', monospace;
    font-size: 2.4rem;
    font-weight: 500;
    letter-spacing: -.03em;
    line-height: 1;
    color: var(--text-primary);
  }
  .clock .seconds {
    font-size: .85rem;
    color: var(--text-secondary);
    vertical-align: super;
    margin-left: 2px;
    font-weight: 400;
  }
  .date-line {
    font-size: .72rem;
    color: var(--text-secondary);
    margin-top: .35rem;
    font-weight: 300;
    letter-spacing: .04em;
  }

  /* ---- STATUS PILL ---- */
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: .4rem;
    padding: .35rem .9rem;
    border-radius: 100px;
    font-size: .7rem;
    font-weight: 500;
    letter-spacing: .08em;
    text-transform: uppercase;
    transition: background var(--transition), color var(--transition);
  }
  .status-pill .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    transition: background var(--transition), box-shadow var(--transition);
  }

  .status-pill[data-status="out"] {
    background: var(--neutral-dim);
    color: var(--neutral);
  }
  .status-pill[data-status="out"] .dot {
    background: var(--neutral);
  }
  .status-pill[data-status="in"] {
    background: var(--accent-dim);
    color: var(--accent);
  }
  .status-pill[data-status="in"] .dot {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 6px rgba(235,32,78,.2); }
    50%      { box-shadow: 0 0 16px rgba(235,32,78,.5); }
  }

  /* ---- BUTTON ---- */
  .btn-wrap { width: 100%; }
  .clock-btn {
    width: 100%;
    padding: .75rem;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: .82rem;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: background var(--transition), color var(--transition), transform .15s ease, box-shadow var(--transition);
  }
  .clock-btn:active { transform: scale(.97); }

  .clock-btn[data-action="in"] {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 28px rgba(235,32,78,.3), inset 0 1px 0 rgba(255,255,255,.15);
  }
  .clock-btn[data-action="in"]:hover {
    box-shadow: 0 8px 36px rgba(235,32,78,.4), inset 0 1px 0 rgba(255,255,255,.15);
  }
  .clock-btn[data-action="out"] {
    background: rgba(255, 255, 255, .08);
    color: var(--text-primary);
    border: 1px solid rgba(255, 255, 255, .10);
    box-shadow: none;
  }
  .clock-btn[data-action="out"]:hover {
    background: rgba(255, 255, 255, .12);
    border-color: rgba(255, 255, 255, .16);
  }

  /* ripple */
  .clock-btn .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,.15);
    transform: scale(0);
    animation: rippleAnim .55s ease-out forwards;
    pointer-events: none;
  }
  @keyframes rippleAnim {
    to { transform: scale(4); opacity: 0; }
  }

  /* ---- LOADING SPINNER ---- */
  .spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    margin: 0 auto;
  }
  .clock-btn.loading .spinner { display: inline-block; }
  .clock-btn.loading .btn-label { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- RESPONSIVE ---- */
  @media (max-width: 400px) {
    .card { padding: 1.15rem 1.1rem; gap: .75rem; border-radius: 16px; }
    .clock { font-size: 2rem; }
    .clock .seconds { font-size: .72rem; }
    .date-line { font-size: .66rem; }
    .status-pill { font-size: .65rem; padding: .3rem .7rem; }
    .clock-btn { padding: .65rem; font-size: .78rem; }
  }
</style>
</head>
<body>

<div class="card">
  <!-- Live Clock -->
  <div class="clock-wrap">
    <div class="clock" id="liveClock">--:--<span class="seconds">--</span></div>
    <div class="date-line" id="dateLine"></div>
  </div>

  <!-- Status Pill -->
  <div class="status-pill" id="statusPill" data-status="out">
    <span class="dot"></span>
    <span id="statusText">Clocked Out</span>
  </div>

  <!-- Action Button -->
  <div class="btn-wrap">
    <button class="clock-btn" id="clockBtn" data-action="in" onclick="handleClock(event)">
      <span class="btn-label">Clock In</span>
      <span class="spinner"></span>
    </button>
  </div>
</div>

<script>
  // ===========================
  //  STATE
  // ===========================
  let isClockedIn = false;

  // ===========================
  //  DOM REFS
  // ===========================
  const liveClock      = document.getElementById('liveClock');
  const dateLine       = document.getElementById('dateLine');
  const statusPill     = document.getElementById('statusPill');
  const statusText     = document.getElementById('statusText');
  const clockBtn       = document.getElementById('clockBtn');

  // ===========================
  //  LIVE CLOCK
  // ===========================
  function updateClock() {
    const now = new Date();
    const h   = now.getHours().toString().padStart(2, '0');
    const m   = now.getMinutes().toString().padStart(2, '0');
    const s   = now.getSeconds().toString().padStart(2, '0');
    liveClock.innerHTML = `${h}:${m}<span class="seconds">${s}</span>`;

    const options = { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' };
    dateLine.textContent = now.toLocaleDateString('en-US', options);
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ===========================
  //  RIPPLE EFFECT
  // ===========================
  function createRipple(e) {
    const btn  = e.currentTarget;
    const rect = btn.getBoundingClientRect();
    const ripple = document.createElement('span');
    ripple.classList.add('ripple');
    const size = Math.max(rect.width, rect.height);
    ripple.style.width = ripple.style.height = size + 'px';
    ripple.style.left  = (e.clientX - rect.left - size / 2) + 'px';
    ripple.style.top   = (e.clientY - rect.top  - size / 2) + 'px';
    btn.appendChild(ripple);
    ripple.addEventListener('animationend', () => ripple.remove());
  }


  // ===========================

  //  Staffbase User API calls to add/remove users from
  //  the "clockin" and "clockout" groups.
  //
  //  Think of these hooks like electrical outlets —
  //  the widget is wired and ready; you just need to
  //  plug in the actual API cable when the time comes.
  // ===========================

  /**
   * Called when the user clocks IN.
   * TODO: PUT /users/{userId}/groups — add to "clockin" group,
   *       remove from "clockout" group.
   */
  async function staffbaseClockIn(/* userId */) {
    // Simulate network latency for now
    return new Promise(resolve => setTimeout(resolve, 600));

    // --- REAL IMPLEMENTATION (example) ---
    // const API_BASE = 'https://<your-instance>.staffbase.com/api';
    // const TOKEN    = '<your-api-token>';
    // const CLOCKIN_GROUP_ID  = '<clockin-group-id>';
    // const CLOCKOUT_GROUP_ID = '<clockout-group-id>';
    //
    // await fetch(`${API_BASE}/groups/${CLOCKIN_GROUP_ID}/members`, {
    //   method: 'POST',
    //   headers: { 'Authorization': `Basic ${TOKEN}`, 'Content-Type': 'application/json' },
    //   body: JSON.stringify({ userIds: [userId] })
    // });
    //
    // await fetch(`${API_BASE}/groups/${CLOCKOUT_GROUP_ID}/members/${userId}`, {
    //   method: 'DELETE',
    //   headers: { 'Authorization': `Basic ${TOKEN}` }
    // });
  }

  /**
   * Called when the user clocks OUT.
   * TODO: PUT /users/{userId}/groups — add to "clockout" group,
   *       remove from "clockin" group.
   */
  async function staffbaseClockOut(/* userId */) {
    return new Promise(resolve => setTimeout(resolve, 600));

    // --- REAL IMPLEMENTATION (example) ---
    // await fetch(`${API_BASE}/groups/${CLOCKOUT_GROUP_ID}/members`, {
    //   method: 'POST',
    //   headers: { 'Authorization': `Basic ${TOKEN}`, 'Content-Type': 'application/json' },
    //   body: JSON.stringify({ userIds: [userId] })
    // });
    //
    // await fetch(`${API_BASE}/groups/${CLOCKIN_GROUP_ID}/members/${userId}`, {
    //   method: 'DELETE',
    //   headers: { 'Authorization': `Basic ${TOKEN}` }
    // });
  }

  // ===========================
  //  MAIN HANDLER
  // ===========================
  async function handleClock(e) {
    createRipple(e);

    // prevent double-click
    clockBtn.classList.add('loading');
    clockBtn.disabled = true;

    try {
      if (!isClockedIn) {
        // --- CLOCK IN ---
        await staffbaseClockIn();
        isClockedIn = true;

        statusPill.dataset.status = 'in';
        statusText.textContent    = 'Clocked In';
        clockBtn.dataset.action   = 'out';
        clockBtn.querySelector('.btn-label').textContent = 'Clock Out';
        document.body.className = 'clocked-in';

      } else {
        // --- CLOCK OUT ---
        await staffbaseClockOut();
        isClockedIn = false;

        statusPill.dataset.status = 'out';
        statusText.textContent    = 'Clocked Out';
        clockBtn.dataset.action   = 'in';
        clockBtn.querySelector('.btn-label').textContent = 'Clock In';
        document.body.className = 'clocked-out';
      }
    } catch (err) {
      console.error('API error:', err);
      alert('Something went wrong. Please try again.');
    } finally {
      clockBtn.classList.remove('loading');
      clockBtn.disabled = false;
    }
  }
</script>
</body>
</html>
